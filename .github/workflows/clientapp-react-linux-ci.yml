name: ClientApp React Linux CI
permissions:
  contents: read
# see also Windows CI

concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
on:
  push:
    branches: [ release/* ]
    paths:
    - 'starsky/starsky/clientapp/**'
  pull_request:
    branches: [ master ]
    paths:
    - 'starsky/starsky/clientapp/**'
    - '.github/workflows/**'
  workflow_dispatch:
  schedule:
    - cron:  '30 4 * * */1'    

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x, 22.x, 20.x, 18.x]

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
    - name: Build ${{ matrix.node-version }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
      with:
        node-version: ${{ matrix.node-version }}

    - name: Cache node modules clientapp
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        # npm cache files are stored in `~/.npm` on Linux/macOS
        path: ~/.npm
        key: ${{ runner.os }}-build-clientapp-${{ hashFiles('./starsky/starsky/clientapp/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-build-clientapp-

    - name: Install Dependencies
      working-directory: ./starsky/starsky/clientapp
      run: npm ci --no-progress --prefer-offline --no-fund
      
    - name: NpmBuild
      working-directory: ./starsky/starsky/clientapp
      run: npm run build

    - name: NpmTest
      working-directory: ./starsky/starsky/clientapp
      run: npm run test:ci
