on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  #  branches: [ master ]

name: WebApp Docker Release on tag for docker hub

permissions:
  contents: write
  pull-requests: none 
  issues: none
  packages: write
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    
      - name: Check Out Repo 
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set output for tags
        id: pushtags
        run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT && cat $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@4a8376e001c7725687f0624d1c3698a3f6ab337e
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Log in to Github Container registry
        uses: docker/login-action@4a8376e001c7725687f0624d1c3698a3f6ab337e
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}     

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@35d5669990ec77242c5a5926b41381a3f26fa947

      - name: Inspect Docker Buildx
        run: |
          echo "Name:      ${{ steps.buildx.outputs.name }}"
          echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
          echo "Status:    ${{ steps.buildx.outputs.status }}"
          echo "Flags:     ${{ steps.buildx.outputs.flags }}"
          echo "Platforms: ${{ steps.buildx.outputs.platforms }}"

      - name: Build and push ${{ steps.pushtags.outputs.tag }}
        id: docker_build
        uses: docker/build-push-action@c269a24fa28c26bf87ecef8c9ec22746dd962204
        with:
          context: ./starsky
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/starsky:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/starsky:${{ steps.pushtags.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.pushtags.outputs.tag }}

            
      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
