name: WebApp Docker buildx multi-arch CI unstable master

concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
    paths:
    - '.github/workflows/starsky-docker-buildx.yml'
    - 'starsky/**'
    
  pull_request:
    branches: [ master ]
    paths:
    - '.github/workflows/starsky-docker-buildx.yml'
    - 'starsky/Dockerfile'
    
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
    
      - name: Check Out Repo 
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        
      - name: Log in to Github Container registry
        uses: docker/login-action@5c42dd293b89d96bae168b5b3694e4e72a5b1117
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}        

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8016837eba79c3b51bf2025379f48b6fc50f1236

      - name: Inspect Docker Buildx ghcr.io/${{ github.repository }}-unstable-nightly
        run: |
          echo "Name:      ${{ steps.buildx.outputs.name }}"
          echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
          echo "Status:    ${{ steps.buildx.outputs.status }}"
          echo "Flags:     ${{ steps.buildx.outputs.flags }}"
          echo "Platforms: ${{ steps.buildx.outputs.platforms }}"

      - name: Extract metadata Github Actions (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@54262e8fce11c7b5496f28398368170da45de7e7
        with:
          images: |
            ghcr.io/${{ github.repository }}-unstable-nightly

      - name: Build and push master
        id: docker_build_push
        uses: docker/build-push-action@b66d8774c665b789105b440514f0c97e6f19b06f
        if: github.event_name != 'pull_request'
        with:
          context: ./starsky
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          build-args: TOOLS=true
          tags: |
            ghcr.io/${{ github.repository }}-unstable-nightly:latest
            ghcr.io/${{ github.repository }}-unstable-nightly:v${{ github.run_id }}

      - name: Build and don't push
        id: docker_build_pull_request
        uses: docker/build-push-action@b66d8774c665b789105b440514f0c97e6f19b06f
        if: github.event_name == 'pull_request'
        with:
          context: ./starsky
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: false
