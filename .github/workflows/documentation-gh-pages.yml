# Simple workflow for deploying static content to GitHub Pages
name: Documentation to github pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]
    paths: 
    - documentation/**

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Cache node modules clientapp
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-documentation-${{ hashFiles('./documentation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-documentation-
            
      - name: Install Dependencies
        working-directory: ./documentation
        run: npm ci --no-progress --prefer-offline --legacy-peer-deps --no-fund
      
      - name: NpmBuild
        working-directory: ./documentation
        run: |
          export DOCS_URL="https://docs.qdraw.nl"
          export DOCS_BASE_URL="/starsky"
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@0ca16172ca884f0a37117fed41734f29784cc980
        with:
          # Upload entire repository
          path: 'documentation/build'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
