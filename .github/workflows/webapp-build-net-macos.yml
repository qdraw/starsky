name: MacOS Webapp .NET only build

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
    paths:
    - 'starsky/**'
    - '!starsky/starsky/clientapp/**'
  workflow_dispatch:
  pull_request:
    branches: [ master ]
    paths:
    - 'starsky/**'
    - '!starsky/starsky/clientapp/**'
    - '.github/workflows/**'
    - '!starsky/Dockerfile'
    - '!starsky/docker_demo_setup.sh'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            arch: x64
          - os: macos-latest
            arch: arm64

    runs-on: ${{ matrix.os }}

    env:
      WEBSITE_SITE_NAME: "ci"

    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
      with:
        dotnet-version: 8.0.422

    - name: "BuildNetCore (MacOS ${{ matrix.arch }})"
      shell: bash
      working-directory: ./starsky
      run: bash build.sh --Target BuildNetCore --no-sonar --no-publish --no-dependencies --no-logo

    - name: "TestNetCore (MacOS ${{ matrix.arch }})"
      shell: bash
      working-directory: ./starsky
      run: bash build.sh --Target TestNetCore --no-logo --no-publish
